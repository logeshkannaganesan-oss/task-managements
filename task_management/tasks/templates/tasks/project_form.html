{% extends 'tasks/base.html' %}

{% block title %}{{ action }} Project - Task Management System{% endblock %}

{% block content %}
<table width="100%" border="0" cellpadding="10" cellspacing="0">
    <tr>
        <td>
            <font face="Arial, Helvetica, sans-serif" size="2">
                <a href="{% url 'index' %}">Dashboard</a> &gt; {{ action }} Project
            </font>
            <br><br>
            <font face="Arial, Helvetica, sans-serif" size="5"><b>{{ action }} Project</b></font>
            <hr color="#003366">
        </td>
    </tr>
    <tr>
        <td>
            <table align="center" width="600" border="1" cellpadding="15" cellspacing="0" bordercolor="#003366" bgcolor="#FFFFFF">
                <tr>
                    <td bgcolor="#003366">
                        <font face="Arial, Helvetica, sans-serif" size="4" color="#FFFFFF">
                            <b>Project Form Fields</b>
                        </font>
                    </td>
                </tr>
                <tr>
                    <td>
                        <form method="post">
                            {% csrf_token %}
                            <table width="100%" border="0" cellpadding="8" cellspacing="0">
                                {{ form.as_table }}
                                <tr>
                                    <td colspan="2" align="center">
                                        <br>
                                        <input type="submit" value="  Save Project  ">
                                        &nbsp;&nbsp;
                                        <a href="{% url 'index' %}"><button type="button">Cancel</button></a>
                                    </td>
                                </tr>
                            </table>
                        </form>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
{% endblock %}
